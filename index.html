<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第十五课 明朝的统治 —— 思维导图填空挑战</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --mountain-far: #b8d4c8;
  --mountain-mid: #9bc4b0;
  --mountain-near: #7ab098;
  --mist: #d4e8dd;
  --cherry-pink: #f2c4c9;
  --cherry-dark: #e8a0a8;
  --scroll-bg: #faf5ec;
  --scroll-border: #c4a87a;
  --ink: #3a2a1a;
  --ink-light: #6b5a4a;
  --gold: #b8963e;
  --gold-light: #d4b86a;
  --jade: #7aac98;
  --jade-light: #a8d4c0;
  --sky-top: #dceef0;
  --sky-bottom: #e8f0e8;
  --water: #c8dcd8;
}

body {
  font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', 'STSong', serif;
  background: linear-gradient(180deg, #dceef0 0%, #e0efe8 15%, #d8e8dc 30%, #c8dcd8 70%, #b8d0c8 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
  cursor: none;
}

/* 梅花鼠标指针 */
.plum-cursor {
  position: fixed;
  pointer-events: none;
  z-index: 10000;
  width: 28px;
  height: 28px;
  transform: translate(-50%, -50%);
  transition: transform 0.05s ease-out;
}
.plum-cursor svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 3px rgba(200,80,80,0.4));
}

/* 天空云层 */
.sky-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 8%, rgba(255,255,255,0.5) 0%, transparent 40%),
    radial-gradient(ellipse at 65% 12%, rgba(255,255,255,0.4) 0%, transparent 35%),
    radial-gradient(ellipse at 85% 5%, rgba(255,255,255,0.35) 0%, transparent 30%);
}

/* 云雾层 */
.cloud-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1;
}
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.35);
  border-radius: 50%;
  filter: blur(30px);
  animation: cloudDrift linear infinite;
}
.cloud:nth-child(1) { width: 300px; height: 60px; top: 8%; left: -10%; animation-duration: 35s; }
.cloud:nth-child(2) { width: 250px; height: 50px; top: 15%; left: 60%; animation-duration: 40s; animation-delay: -10s; }
.cloud:nth-child(3) { width: 350px; height: 55px; top: 5%; left: 30%; animation-duration: 45s; animation-delay: -20s; }
.cloud:nth-child(4) { width: 200px; height: 40px; top: 20%; left: 80%; animation-duration: 38s; animation-delay: -15s; }
@keyframes cloudDrift {
  0% { transform: translateX(0); }
  100% { transform: translateX(120vw); }
}

/* 远山 SVG 层 */
.mountains-layer {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1;
}
.mountains-layer svg {
  position: absolute; bottom: 0; left: 0; width: 100%;
}

/* 水面倒影 */
.water-layer {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 15%;
  pointer-events: none; z-index: 2;
  background: linear-gradient(180deg,
    rgba(180,210,200,0.1) 0%,
    rgba(170,200,190,0.3) 20%,
    rgba(160,195,185,0.5) 50%,
    rgba(150,185,175,0.6) 100%
  );
}
.water-ripple {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 3px,
    rgba(255,255,255,0.08) 3px, rgba(255,255,255,0.08) 5px
  );
  animation: waterShimmer 4s ease-in-out infinite;
}
@keyframes waterShimmer {
  0%, 100% { opacity: 0.5; transform: translateY(0); }
  50% { opacity: 0.8; transform: translateY(-2px); }
}

/* 樱花树 */
.cherry-tree {
  position: fixed; pointer-events: none; z-index: 3;
}
.cherry-tree.left {
  bottom: 12%; left: 2%;
  width: 280px; height: 500px;
}
.cherry-tree.right {
  bottom: 10%; right: 1%;
  width: 260px; height: 480px;
}

/* 飞鸟 */
.bird {
  position: fixed; pointer-events: none; z-index: 4;
  animation: birdFly linear infinite;
}
.bird svg { width: 30px; height: 20px; }
.bird:nth-child(1) { top: 18%; animation-duration: 18s; animation-delay: 0s; }
.bird:nth-child(2) { top: 22%; animation-duration: 22s; animation-delay: -6s; }
.bird:nth-child(3) { top: 14%; animation-duration: 20s; animation-delay: -12s; }
.bird:nth-child(4) { top: 25%; animation-duration: 24s; animation-delay: -8s; }
.bird:nth-child(5) { top: 16%; animation-duration: 19s; animation-delay: -15s; }
@keyframes birdFly {
  0% { left: -5%; transform: translateY(0) scaleX(1); }
  25% { transform: translateY(-15px) scaleX(1); }
  50% { transform: translateY(0) scaleX(1); }
  75% { transform: translateY(-10px) scaleX(1); }
  100% { left: 105%; transform: translateY(0) scaleX(1); }
}

/* 飘落花瓣 */
.petal-fall {
  position: fixed; pointer-events: none; z-index: 5;
  animation: petalDrift linear forwards;
}
@keyframes petalDrift {
  0% { opacity: 0; transform: translateY(-30px) rotate(0deg) translateX(0); }
  8% { opacity: 0.85; }
  85% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(110vh) rotate(720deg) translateX(var(--drift)); }
}

/* 光粒子 */
.light-particle {
  position: fixed; pointer-events: none; z-index: 2;
  width: 3px; height: 3px;
  background: rgba(255,255,220,0.7);
  border-radius: 50%;
  animation: particleFloat linear infinite;
  box-shadow: 0 0 6px rgba(255,255,220,0.5);
}
@keyframes particleFloat {
  0% { opacity: 0; transform: translateY(100vh) translateX(0); }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-10vh) translateX(var(--drift-x)); }
}

/* 主容器 - 展开古卷 */
.main-wrapper {
  position: relative; z-index: 10;
  max-width: 1400px; margin: 0 auto;
  padding: 20px 30px 40px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* 古卷轴 */
.scroll-container {
  flex: 1;
  position: relative;
  background: linear-gradient(180deg,
    rgba(250,245,236,0.92) 0%,
    rgba(248,240,228,0.94) 30%,
    rgba(245,235,220,0.93) 70%,
    rgba(240,228,210,0.9) 100%
  );
  border: 3px solid var(--scroll-border);
  border-radius: 8px;
  box-shadow:
    0 8px 40px rgba(0,0,0,0.15),
    inset 0 0 80px rgba(180,150,110,0.08),
    0 0 0 8px rgba(196,168,122,0.15),
    0 0 0 16px rgba(196,168,122,0.06);
  padding: 30px 24px 20px;
  margin: 10px 0;
  overflow: visible;
  animation: scrollUnfold 1s ease-out;
}
@keyframes scrollUnfold {
  0% { transform: scaleY(0.3); opacity: 0; }
  100% { transform: scaleY(1); opacity: 1; }
}
.scroll-container::before {
  content: ''; position: absolute;
  top: -16px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 16px;
  background: linear-gradient(180deg, #c4a070, #a08050);
  border-radius: 8px 8px 0 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.scroll-container::after {
  content: ''; position: absolute;
  bottom: -16px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 16px;
  background: linear-gradient(180deg, #a08050, #c4a070);
  border-radius: 0 0 8px 8px;
  box-shadow: 0 -2px 6px rgba(0,0,0,0.2);
}

/* 卷轴纹理 */
.scroll-texture {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,150,110,0.04) 28px, rgba(180,150,110,0.04) 29px),
    repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(180,150,110,0.03) 48px, rgba(180,150,110,0.03) 49px);
  border-radius: 8px;
}

/* 开始界面 */
.start-screen {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 70vh; gap: 24px;
  animation: fadeInUp 0.8s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.start-title-area { text-align: center; }

/* 两侧古诗 */
.side-poem {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  writing-mode: vertical-rl;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(22px, 2.8vw, 32px);
  color: #8a8a8a;
  letter-spacing: 10px;
  line-height: 2.6;
  text-shadow: 1px 1px 3px rgba(255,255,255,0.7);
  pointer-events: none;
  z-index: 3;
  white-space: nowrap;
}
.side-poem.left {
  left: clamp(12px, 3.5vw, 50px);
  animation: poemRevealLeft 2.5s ease-out 0.3s both;
}
.side-poem.right {
  right: clamp(12px, 3.5vw, 50px);
  animation: poemRevealRight 2.5s ease-out 0.3s both;
}

@keyframes poemRevealLeft {
  0% { opacity: 0; transform: translateY(-50%) translateX(-50px); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(-50%) translateX(0); filter: blur(0); }
}
@keyframes poemRevealRight {
  0% { opacity: 0; transform: translateY(-50%) translateX(50px); filter: blur(6px); }
  100% { opacity: 1; transform: translateY(-50%) translateX(0); filter: blur(0); }
}

/* 毛笔笔触装饰线 */
.poem-brush-line {
  position: absolute;
  width: 2px;
  background: linear-gradient(180deg, transparent, #9a9a9a, transparent);
  opacity: 0.2;
  animation: brushGrow 2s ease-out 0.5s both;
}
.poem-brush-line.left-line {
  left: clamp(10px, 3.2vw, 46px);
  top: 15%; height: 70%;
}
.poem-brush-line.right-line {
  right: clamp(10px, 3.2vw, 46px);
  top: 15%; height: 70%;
}
@keyframes brushGrow {
  0% { transform: scaleY(0); opacity: 0; }
  100% { transform: scaleY(1); opacity: 0.2; }
}

.start-seal {
  display: inline-block;
  border: 2px solid #c04040; color: #c04040;
  padding: 4px 18px; font-size: 13px;
  letter-spacing: 5px; margin-bottom: 14px;
  font-family: 'Ma Shan Zheng', cursive;
  transform: rotate(-2deg);
}

.start-main-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(34px, 5.5vw, 56px);
  color: var(--ink); letter-spacing: 8px;
  line-height: 1.4;
}
.start-main-title .lesson-num {
  display: block; font-size: 0.42em;
  color: #c04040; letter-spacing: 5px;
  margin-bottom: 6px; font-family: 'Noto Serif SC', serif;
}
.start-main-title .sub {
  display: block; font-size: 0.28em;
  color: var(--ink-light); letter-spacing: 6px;
  margin-top: 6px; font-family: 'Noto Serif SC', serif;
}

.title-divider {
  width: 180px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 6px auto; position: relative;
}
.title-divider::after {
  content: '◆'; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: var(--gold); font-size: 10px;
  background: rgba(250,245,236,0.92); padding: 0 8px;
}

.timer-picker {
  display: flex; gap: 16px; align-items: center;
  flex-wrap: wrap; justify-content: center;
}
.timer-label-text {
  font-size: 15px; color: var(--ink-light); letter-spacing: 2px;
}
.timer-opt {
  font-family: 'Noto Serif SC', serif; font-size: 15px;
  padding: 10px 22px; border: 2px solid #d4c8b0;
  background: rgba(255,255,255,0.7); color: var(--ink);
  border-radius: 28px; cursor: pointer;
  transition: all 0.3s ease; letter-spacing: 2px;
}
.timer-opt:hover { border-color: var(--gold); color: var(--gold); }
.timer-opt.active {
  background: linear-gradient(135deg, var(--gold), #a08040);
  color: #fff; border-color: var(--gold);
  box-shadow: 0 3px 12px rgba(184,150,62,0.35);
}

.btn-start {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(20px, 3vw, 28px);
  color: #fff;
  background: linear-gradient(135deg, #c04040, #8b2020);
  border: none; padding: 14px 56px;
  border-radius: 40px; cursor: pointer;
  letter-spacing: 6px;
  box-shadow: 0 6px 20px rgba(192,64,64,0.35);
  transition: all 0.3s ease;
  animation: btnPulse 2.5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
.btn-start:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(192,64,64,0.45);
}
.btn-start:active { transform: translateY(0); }
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 6px 20px rgba(192,64,64,0.35); }
  50% { box-shadow: 0 6px 32px rgba(192,64,64,0.55); }
}

/* 游戏界面 */
.game-screen { display: none; position: relative; z-index: 2; }
.game-screen.active { display: block; animation: fadeInUp 0.5s ease; }

.game-top-bar {
  display: flex; justify-content: space-between;
  align-items: center; padding: 6px 10px;
  flex-wrap: wrap; gap: 8px;
  border-bottom: 1px solid rgba(180,150,110,0.2);
  margin-bottom: 16px;
}
.game-top-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(18px, 2.5vw, 24px);
  color: var(--ink); letter-spacing: 4px;
}
.timer-box {
  display: flex; align-items: center; gap: 8px;
  font-size: clamp(16px, 2vw, 22px);
  color: #c04040; font-weight: bold;
  letter-spacing: 2px;
}
.timer-icon-anim {
  animation: timerBeat 1s ease-in-out infinite;
}
@keyframes timerBeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}
.timer-urgent {
  animation: urgentFlash 0.5s ease-in-out infinite;
  color: #cc0000;
}
@keyframes urgentFlash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.progress-line {
  width: 100%; height: 5px;
  background: rgba(180,150,110,0.15);
  border-radius: 3px; overflow: hidden;
  margin-bottom: 16px;
}
.progress-fill-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--jade), var(--gold), #c04040);
  border-radius: 3px; transition: width 0.5s ease;
}

/* 思维导图 - 左右布局 */
.mindmap-area {
  position: relative;
  display: flex; align-items: stretch;
  gap: 0; min-height: 400px;
}

/* 中心节点 */
.center-col {
  display: flex; align-items: center;
  justify-content: center;
  flex-shrink: 0; width: 140px;
  position: relative; z-index: 2;
}
.center-node-circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f0d8b0, #d4a96a, #c49550);
  display: flex; align-items: center;
  justify-content: center;
  text-align: center;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(18px, 2.5vw, 22px);
  color: #3d2b1f; font-weight: bold;
  border: 3px solid #b8843a;
  box-shadow: 0 6px 24px rgba(180,130,60,0.35), inset 0 2px 8px rgba(255,255,255,0.3);
  letter-spacing: 4px;
  animation: centerGlow 3s ease-in-out infinite;
  position: relative;
}
.center-node-circle::after {
  content: ''; position: absolute;
  inset: -10px; border-radius: 50%;
  border: 1px solid rgba(184,132,58,0.3);
  pointer-events: none;
}
@keyframes centerGlow {
  0%, 100% { box-shadow: 0 6px 24px rgba(180,130,60,0.35), inset 0 2px 8px rgba(255,255,255,0.3); }
  50% { box-shadow: 0 6px 36px rgba(180,130,60,0.5), inset 0 2px 12px rgba(255,255,255,0.4); }
}

/* 分支列 */
.branches-col {
  flex: 1; display: flex;
  flex-direction: column; gap: 14px;
  position: relative; z-index: 2;
  padding-left: 24px;
}

.branch-row {
  display: flex; align-items: flex-start;
  gap: 0; position: relative;
}

.branch-label-col {
  flex-shrink: 0; width: 130px;
  display: flex; align-items: center;
  justify-content: center;
  padding-left: 16px;
}
.branch-label-pill {
  width: 115px; height: 50px;
  border-radius: 25px;
  background: linear-gradient(135deg, #f0dcc0, #e0c898);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 0.9rem; font-weight: bold;
  color: var(--ink); letter-spacing: 3px;
  border: 2px solid var(--scroll-border);
  box-shadow: 0 3px 10px rgba(180,150,100,0.2);
}

.branch-children-row {
  display: flex; flex-wrap: wrap;
  gap: 16px; flex: 1;
  padding-left: 24px;
  align-items: flex-start;
}

.sub-node-group {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}

.sub-node-label {
  font-size: 0.8rem; color: var(--ink-light);
  font-weight: bold; letter-spacing: 2px;
  padding: 3px 12px;
  background: rgba(235,225,210,0.6);
  border-radius: 10px;
  border: 1px solid rgba(180,150,110,0.25);
}

.dashed-box {
  width: 175px; min-height: 54px;
  border: 2.5px dashed var(--gold);
  border-radius: 10px;
  background: rgba(255,255,255,0.5);
  display: flex; align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 8px 12px; text-align: center;
  position: relative;
  animation: dashGlow 2.8s ease-in-out infinite;
  color: #b0a080; font-size: 0.82rem;
  letter-spacing: 1px;
}
.dashed-box:hover {
  border-color: #c04040;
  background: rgba(255,252,245,0.85);
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(192,64,64,0.15);
}
@keyframes dashGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(184,150,62,0.15); }
  50% { box-shadow: 0 0 0 8px rgba(184,150,62,0); }
}

.dashed-box.filled {
  border-style: solid; border-color: var(--gold);
  background: rgba(240,225,200,0.55);
  animation: none; cursor: default;
  color: var(--ink); font-weight: bold;
  font-size: 0.78rem;
}
.dashed-box.filled:hover { transform: none; box-shadow: none; }
.dashed-box.filled.wrong-reveal {
  border-color: #e74c3c;
  background: rgba(255,235,235,0.6);
}

/* 只读节点（直接显示答案） */
.dashed-box.solid-box {
  border-style: solid;
  border-color: var(--jade);
  background: rgba(200,230,210,0.45);
  animation: none;
  cursor: default;
  color: var(--ink);
  font-weight: bold;
  font-size: 0.78rem;
}
.dashed-box.solid-box:hover {
  transform: none;
  box-shadow: none;
  border-color: var(--jade);
  background: rgba(200,230,210,0.45);
}

/* 选项弹窗 */
.option-overlay {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex; align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.option-panel {
  background: linear-gradient(180deg, #fefcf7, #f8f2e6);
  border-radius: 16px; padding: 26px 28px 20px;
  min-width: 400px; max-width: 500px;
  border: 2px solid var(--scroll-border);
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  animation: panelIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes panelIn {
  from { transform: scale(0.85) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.option-panel h3 {
  text-align: center; color: var(--ink);
  font-size: 1.1rem; letter-spacing: 3px;
  margin-bottom: 4px;
}
.option-panel .q-hint {
  text-align: center; color: var(--ink-light);
  font-size: 0.85rem; margin-bottom: 14px;
  letter-spacing: 2px;
}
.option-list {
  display: flex; flex-direction: column; gap: 9px;
}
.option-item {
  padding: 12px 16px;
  border: 1.5px solid #d8ccb8;
  border-radius: 10px; cursor: pointer;
  font-size: 0.88rem; color: var(--ink);
  background: rgba(255,255,255,0.6);
  transition: all 0.25s;
  letter-spacing: 1px; line-height: 1.5;
}
.option-item:hover {
  background: rgba(240,225,200,0.65);
  border-color: var(--gold);
  transform: translateX(4px);
  box-shadow: 0 2px 10px rgba(180,150,100,0.2);
}

/* 完成按钮 */
.btn-finish {
  position: fixed; bottom: 30px; right: 40px;
  z-index: 150;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(16px, 2vw, 20px);
  color: #fff;
  background: linear-gradient(135deg, var(--jade), #5a8a6a);
  border: none; padding: 10px 28px;
  border-radius: 25px; cursor: pointer;
  letter-spacing: 4px;
  box-shadow: 0 4px 16px rgba(90,122,74,0.35);
  transition: all 0.3s ease;
}
.btn-finish:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 22px rgba(90,122,74,0.45);
}

/* 确认弹窗 */
.confirm-overlay {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.45);
  z-index: 250;
  display: flex; align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.confirm-card {
  background: linear-gradient(180deg, #fefcf7, #f8f2e6);
  border-radius: 16px; padding: 28px 34px;
  text-align: center;
  border: 2px solid var(--scroll-border);
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  animation: panelIn 0.3s ease;
}
.confirm-card p {
  font-size: 1.05rem; color: var(--ink);
  margin-bottom: 18px; letter-spacing: 2px;
}
.confirm-btns { display: flex; gap: 14px; justify-content: center; }
.confirm-btns button {
  padding: 10px 26px; font-size: 0.95rem;
  font-family: inherit; border-radius: 22px;
  cursor: pointer; letter-spacing: 2px;
  transition: all 0.25s; border: none;
}
.btn-cancel { background: #e0d8cc; color: var(--ink); }
.btn-cancel:hover { background: #d0c8b8; }
.btn-confirm {
  background: linear-gradient(135deg, #c04040, #8b2020);
  color: #fff;
}
.btn-confirm:hover { box-shadow: 0 4px 14px rgba(192,64,64,0.4); }

.end-screen.active {
  display: flex;
  animation: fadeInUp 0.6s ease;
}

.score-card-main {
  text-align: center;
  background: linear-gradient(135deg, #fdf8f0, #f5ecd8);
  border: 3px solid var(--gold);
  border-radius: 20px; padding: 28px 44px;
  margin-bottom: 24px;
  box-shadow: 0 8px 32px rgba(184,150,62,0.25);
  position: relative;
}
.score-card-main::before {
  content: ''; position: absolute;
  inset: -10px; border: 1px solid rgba(184,150,62,0.2);
  border-radius: 26px; pointer-events: none;
}
.score-label-text {
  font-size: 16px; color: var(--ink-light);
  letter-spacing: 4px; margin-bottom: 8px;
}
.score-value-num {

}
.score-unit-text {
  font-size: 0.38em; color: var(--ink-light);
}
.score-grade-text {
  font-size: 18px; letter-spacing: 4px;

}
.grade-a { color: #c04040; }
.grade-b { color: #b8863e; }
.grade-c { color: #5a7a4a; }
.grade-d { color: #8b6b4a; }

.seal-stamp-round {
  position: absolute; top: -18px; right: -14px;
  width: 66px; height: 66px;
  border: 3px solid #c04040; border-radius: 50%;
  display: flex; align-items: center;
  justify-content: center;
  color: #c04040;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 18px; transform: rotate(15deg);
  opacity: 0;
  animation: sealPop 0.6s 0.4s ease forwards;
}
@keyframes sealPop {
  from { opacity: 0; transform: rotate(15deg) scale(2); }
  to { opacity: 0.85; transform: rotate(15deg) scale(1); }

  border-radius: 40px; cursor: pointer;
  letter-spacing: 4px; margin-top: 18px;

.btn-restart:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(192,64,64,0.4);

  right: 20px;

let gameState = {
  totalTime: 180,
  timeLeft: 180,
  timerInterval: null,
  answers: {},
  currentQid: null,
  gameActive: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTotalQuestions() {
  return mindMapData.branches.reduce((s, b) => s + b.children.length, 0);
}

function selectTimer(btn, seconds) {
  document.querySelectorAll('.timer-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  gameState.totalTime = seconds;
}

function startGame() {
  gameState.timeLeft = gameState.totalTime;
  gameState.answers = {};
  gameState.currentQid = null;
  gameState.gameActive = true;

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('endScreen').classList.remove('active');
  document.getElementById('finishBtn').classList.remove('hidden');

  buildMindMap();
  updateTimerDisplay();
  updateProgress();
  startTimer();
  startPetals();
}

function buildMindMap() {
  const container = document.getElementById('mindmapContainer');
  container.innerHTML = '';

  const centerCol = document.createElement('div');
  centerCol.className = 'center-col';
  centerCol.innerHTML = `<div class="center-node-circle">${mindMapData.central}</div>`;
  container.appendChild(centerCol);

  const branchesCol = document.createElement('div');
  branchesCol.className = 'branches-col';

  mindMapData.branches.forEach((branch, bi) => {
    const branchRow = document.createElement('div');
    branchRow.className = 'branch-row';
    branchRow.style.animationDelay = `${bi * 0.12}s`;

    const labelCol = document.createElement('div');
    labelCol.className = 'branch-label-col';
    labelCol.innerHTML = `<div class="branch-label-pill">${branch.label}</div>`;
    branchRow.appendChild(labelCol);

    const childrenRow = document.createElement('div');
    childrenRow.className = 'branch-children-row';

    branch.children.forEach(child => {
      const group = document.createElement('div');
      group.className = 'sub-node-group';

      const subLabel = document.createElement('div');
      subLabel.className = 'sub-node-label';
      subLabel.textContent = child.subLabel;
      group.appendChild(subLabel);

      if (child.readOnly) {
        const solidBox = document.createElement('div');
        solidBox.className = 'dashed-box solid-box';
        solidBox.textContent = child.correct;
        group.appendChild(solidBox);
      } else {
        const dashedBox = document.createElement('div');
        dashedBox.className = 'dashed-box';
        dashedBox.dataset.qid = child.id;
        dashedBox.textContent = '点击选择';

        if (gameState.answers[child.id]) {
          dashedBox.classList.add('filled');
          dashedBox.textContent = gameState.answers[child.id];
        }

        dashedBox.addEventListener('click', () => openOptions(child, dashedBox));
        group.appendChild(dashedBox);
      }
      childrenRow.appendChild(group);
    });

    branchRow.appendChild(childrenRow);
    branchesCol.appendChild(branchRow);
  });

  container.appendChild(branchesCol);
}

function openOptions(child, dashedBox) {
  if (!gameState.gameActive) return;
  if (gameState.answers[child.id]) return;

  gameState.currentQid = child.id;

  const overlay = document.getElementById('optionOverlay');
  const panel = document.getElementById('optionPanel');
  const shuffled = shuffle(child.options);

  panel.innerHTML = `
    <h3>请选择正确答案</h3>
    <div class="q-hint">${child.subLabel}</div>
    <div class="option-list">
      ${shuffled.map(opt => `
        <div class="option-item" data-value="${encodeURIComponent(opt)}">${opt}</div>
      `).join('')}
    </div>
  `;

  overlay.classList.remove('hidden');
}

document.getElementById('optionPanel').addEventListener('click', function(e) {
  const item = e.target.closest('.option-item');
  if (!item) return;

  const value = decodeURIComponent(item.dataset.value);
  const qid = gameState.currentQid;

  gameState.answers[qid] = value;
  gameState.currentQid = null;

  const box = document.querySelector(`.dashed-box[data-qid="${qid}"]`);
  if (box) {
    box.classList.add('filled');
    box.textContent = value;
  }

  document.getElementById('optionOverlay').classList.add('hidden');
  updateProgress();

  const total = getTotalQuestions();
  if (Object.keys(gameState.answers).length >= total) {
    setTimeout(() => {
      const btn = document.getElementById('finishBtn');
      btn.style.animation = 'btnPulse 1s ease-in-out 3';
    }, 200);
  }
});

document.getElementById('optionOverlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.add('hidden');
    gameState.currentQid = null;
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('optionOverlay').classList.add('hidden');
    document.getElementById('confirmOverlay').classList.add('hidden');
    gameState.currentQid = null;
  }
});

function startTimer() {
  clearInterval(gameState.timerInterval);
  gameState.timerInterval = setInterval(() => {
    gameState.timeLeft--;
    updateTimerDisplay();
    if (gameState.timeLeft <= 0) {
      clearInterval(gameState.timerInterval);
      submitExam();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(gameState.timeLeft / 60);
  const s = gameState.timeLeft % 60;
  const text = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timerText');
  el.textContent = text;
  if (gameState.timeLeft <= 30) {
    el.classList.add('timer-urgent');
  } else {
    el.classList.remove('timer-urgent');
  }
}

function updateProgress() {
  const total = getTotalQuestions();
  const filled = Object.keys(gameState.answers).length;
  document.getElementById('progressText').textContent = `(${filled}/${total})`;
  document.getElementById('progressFill').style.width = `${(filled/total)*100}%`;
}

function confirmFinish() {
  document.getElementById('confirmOverlay').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.add('hidden');
}

function submitExam() {
  gameState.gameActive = false;
  clearInterval(gameState.timerInterval);
  document.getElementById('confirmOverlay').classList.add('hidden');
  document.getElementById('optionOverlay').classList.add('hidden');
  stopPetals();

  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('finishBtn').classList.add('hidden');
  document.getElementById('endScreen').classList.add('active');

  const allQuestions = [];
  mindMapData.branches.forEach(b => {
    b.children.forEach(c => allQuestions.push(c));
  });

  const answerableQuestions = allQuestions.filter(q => !q.readOnly);
  const total = answerableQuestions.length;
  let correctCount = 0;
  const wrongList = [];

  answerableQuestions.forEach(q => {
    const userAnswer = gameState.answers[q.id];
    if (userAnswer === q.correct) {
      correctCount++;
    } else {
      wrongList.push({
        subLabel: q.subLabel,
        userAnswer: userAnswer || '未作答',
        correctAnswer: q.correct
      });
    }
  });

  const score = total > 0 ? Math.round((correctCount / total) * 100) : 0;

  document.querySelectorAll('.dashed-box').forEach(box => {
    const qid = box.dataset.qid;
    if (qid && gameState.answers[qid]) {
      const q = allQuestions.find(q => q.id === qid);
      if (q && gameState.answers[qid] !== q.correct) {
        box.classList.add('wrong-reveal');
      }
    }
  });

  document.getElementById('scoreValue').innerHTML = `${score}<span class="score-unit-text"> / 100 分</span>`;

  const gradeEl = document.getElementById('scoreGrade');
  if (score >= 90) { gradeEl.className = 'score-grade-text grade-a'; gradeEl.textContent = '🏆 优秀！学识渊博！'; }
  else if (score >= 75) { gradeEl.className = 'score-grade-text grade-b'; gradeEl.textContent = '👍 良好！继续加油！'; }
  else if (score >= 60) { gradeEl.className = 'score-grade-text grade-c'; gradeEl.textContent = '📖 及格，还需努力！'; }
  else { gradeEl.className = 'score-grade-text grade-d'; gradeEl.textContent = '📚 继续学习，温故知新！'; }

  const wrongListEl = document.getElementById('wrongList');
  if (wrongList.length === 0) {
    wrongListEl.innerHTML = '<div class="no-wrong-msg">🎉 全部正确！太棒了！</div>';
  } else {
    wrongListEl.innerHTML = wrongList.map((w, i) => `
      <div class="wrong-item-row" style="animation-delay:${i*0.08}s">
        <div class="wrong-q-text">
          📌 ${w.subLabel}
          <div class="wrong-detail-text">你的答案：<span style="color:#e74c3c;text-decoration:line-through;">${w.userAnswer}</span></div>
        </div>
        <div class="wrong-correct-text">✅ ${w.correctAnswer}</div>
      </div>
    `).join('');
  }

  document.getElementById('endScreen').scrollIntoView({ behavior: 'smooth' });
}

function restartGame() {
  clearInterval(gameState.timerInterval);
  stopPetals();
  gameState.answers = {};
  gameState.currentQid = null;
  gameState.gameActive = false;

  document.getElementById('endScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('finishBtn').classList.add('hidden');
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('timerText').classList.remove('timer-urgent');
  document.getElementById('mindmapContainer').innerHTML = '';
}

/* 花瓣系统 */
let petalTimer = null;
function startPetals() {
  stopPetals();
  petalTimer = setInterval(createPetal, 2000);
  for (let i = 0; i < 5; i++) setTimeout(() => createPetal(), i * 350);
}
function stopPetals() {
  if (petalTimer) { clearInterval(petalTimer); petalTimer = null; }
  document.querySelectorAll('.petal-fall').forEach(p => p.remove());
}
function createPetal() {
  const petal = document.createElement('div');
  petal.className = 'petal-fall';
  const size = 6 + Math.random() * 12;
  const startX = Math.random() * 95;
  const dur = 7 + Math.random() * 9;
  const drift = (Math.random() - 0.5) * 180;
  const rot = Math.random() * 360;
  const colors = ['#f2c4c9', '#f5d0d5', '#f0bcc2', '#e8a0a8', '#f8d8dc'];
  const color = colors[Math.floor(Math.random() * colors.length)];

  petal.style.cssText = `
    left: ${startX}%; top: -20px;
    width: ${size}px; height: ${size*1.3}px;
    background: ${color};
    border-radius: 50% 0 50% 0;
    --drift: ${drift}px;
    animation-duration: ${dur}s;
    transform: rotate(${rot}deg);
  `;
  document.getElementById('petalsContainer').appendChild(petal);
  setTimeout(() => { if (petal.parentNode) petal.remove(); }, dur * 1000 + 600);
}

/* 光粒子 */
function createParticles() {
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'light-particle';
    p.style.cssText = `
      left: ${Math.random()*95}%;
      --drift-x: ${(Math.random()-0.5)*80}px;
      animation-duration: ${8+Math.random()*12}s;
      animation-delay: ${Math.random()*10}s;
      width: ${2+Math.random()*3}px;
      height: ${2+Math.random()*3}px;
    `;
    document.body.appendChild(p);
  }
}
createParticles();

/* 初始花瓣 */
for (let i = 0; i < 4; i++) {
  setTimeout(() => createPetal(), i * 500);
}

/* ===== 背景音乐控制 ===== */
let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicToggle');
  if (musicPlaying) {
    audio.pause();
    btn.textContent = '🔇';
    btn.classList.remove('playing');
    musicPlaying = false;
  } else {
    audio.play().catch(() => {});
    btn.textContent = '🎵';
    btn.classList.add('playing');
    musicPlaying = true;
  }
}

/* 页面加载后自动播放音乐 */
window.addEventListener('load', () => {
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicToggle');
  audio.play().then(() => {
    btn.textContent = '🎵';
    btn.classList.add('playing');
    musicPlaying = true;
  }).catch(() => {
    // 浏览器阻止自动播放，等待用户交互
    btn.textContent = '🔇';
  });
});

/* ===== 水墨梅花鼠标甩尾 ===== */
const plumSVG = `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><g opacity="0.7"><path d="M20,35 Q18,25 15,20 Q12,15 8,12" stroke="#8b5a5a" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M20,35 Q22,28 25,22 Q28,16 32,14" stroke="#7a4a4a" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M20,35 Q20,28 20,22 Q20,16 18,10" stroke="#6b3a3a" stroke-width="1" fill="none" stroke-linecap="round"/><circle cx="8" cy="12" r="3.5" fill="#e8a0a8"/><circle cx="8" cy="12" r="1.8" fill="#d4787a"/><circle cx="32" cy="14" r="3" fill="#f0b0b8"/><circle cx="32" cy="14" r="1.5" fill="#d4787a"/><circle cx="18" cy="10" r="2.5" fill="#e8a0a8"/><circle cx="18" cy="10" r="1.3" fill="#d4787a"/><circle cx="12" cy="18" r="2" fill="#f0c0c8" opacity="0.8"/><circle cx="28" cy="20" r="1.8" fill="#f0c0c8" opacity="0.8"/></g></svg>`;

let mouseX = 0, mouseY = 0;
let lastPlumTime = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  const now = Date.now();
  if (now - lastPlumTime > 80) {
    lastPlumTime = now;
    createInkPlum(mouseX, mouseY);
  }
});

function createInkPlum(x, y) {
  const el = document.createElement('div');
  el.className = 'ink-plum-cursor';
  el.innerHTML = plumSVG;
  const size = 16 + Math.random() * 20;
  const rot = Math.random() * 360;
  el.style.cssText = `
    left: ${x - size/2}px;
    top: ${y - size/2}px;
    width: ${size}px;
    height: ${size}px;
    transform: rotate(${rot}deg);
    animation: inkPlumFade 1.2s ease-out forwards;
  `;
  document.body.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 1200);
}

const inkPlumStyle = document.createElement('style');
inkPlumStyle.textContent = `
@keyframes inkPlumFade {
  0% { opacity: 0.8; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.9); }
  100% { opacity: 0; transform: scale(0.5) translateY(-20px); }
}
`;
document.head.appendChild(inkPlumStyle);

/* ===== 梅花鼠标指针 ===== */

const plumCursor = document.createElement('div');
plumCursor.className = 'plum-cursor';
plumCursor.innerHTML = cursorPlumSVG;
document.body.appendChild(plumCursor);

document.addEventListener('mousemove', (e) => {
  plumCursor.style.left = e.clientX + 'px';
  plumCursor.style.top = e.clientY + 'px';
});
</script>
